<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="referrer" content="no-referrer">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TV GLOBAL - Premium Experience</title>
  <meta name="description" content="Ver Cable Vision HD ✅ disfruta de una de las mejores plataformas de television por internet con canales online totalmente gratis y en alta definicion.">
  <link rel="shortcut icon" href="https://www.cablevisionhd.com/imge/cablevisionhd.png">  
  
  <!-- Tailwind & Icons -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Video Players -->
  <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <!-- Databases -->
  <script src="vip_database.js"></script>
  <script src="premium_database.js"></script>
  <script src="movies_database.js"></script>
  <script src="series_database.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap');
    
    :root {
      --bg-color: #07070a; /* Dark sleek background */
      --accent: #e50914; /* Netflix red, but we can use Claro Video blue or Gold */
      --accent-gold: #cfa85e; /* Premium Gold from old design */
      --text-main: #f5f5f7;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
      overflow-x: hidden;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-gold); }

    /* Navbar Transitions */
    #navbar {
      transition: background-color 0.4s ease, backdrop-filter 0.4s ease;
      background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
    }
    #navbar.scrolled {
      background-color: rgba(7, 7, 10, 0.95);
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    }
    .nav-link {
      transition: color 0.3s;
      position: relative;
    }
    .nav-link:hover, .nav-link.active {
      color: white;
      font-weight: 500;
    }
    .nav-link.active::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--accent-gold);
      box-shadow: 0 0 10px var(--accent-gold);
    }

    /* Hero Section */
    .hero {
      position: relative;
      height: 75vh;
      width: 100%;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      align-items: flex-end;
      padding-bottom: 50px;
      transition: background-image 1s ease-in-out;
    }
    .hero-vignette {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(to top, var(--bg-color) 0%, transparent 50%, rgba(0,0,0,0.6) 100%),
                  linear-gradient(to right, rgba(7,7,10,0.8) 0%, transparent 50%);
    }
    .hero-content {
      position: relative;
      z-index: 10;
      padding: 0 4%;
      max-width: 800px;
    }
    .hero-title {
      font-size: clamp(2.5rem, 5vw, 4.5rem);
      font-weight: 900;
      text-transform: uppercase;
      line-height: 1.1;
      margin-bottom: 15px;
      text-shadow: 2px 2px 15px rgba(0,0,0,0.8);
    }
    .hero-desc {
      font-size: 1.1rem;
      font-weight: 300;
      margin-bottom: 25px;
      text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
      opacity: 0.9;
    }
    .btn-premium {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      padding: 10px 24px;
      border-radius: 6px;
      font-weight: 600;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .btn-premium:hover {
      background: white;
      color: black;
      transform: scale(1.05);
    }
    .btn-gold {
      background: var(--accent-gold);
      color: black;
      border: none;
    }
    .btn-gold:hover {
      background: #e6be6f;
      box-shadow: 0 0 15px rgba(207, 168, 94, 0.5);
    }

    /* Content Rows (Netflix Style) */
    .row-container {
      margin-top: -3vw;
      position: relative;
      z-index: 20;
      padding: 0 4%;
      margin-bottom: 40px;
    }
    .row-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .row-inner {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 15px 0 25px 0; /* padding for hover scale */
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }
    .row-inner::-webkit-scrollbar { display: none; }
    
    /* Cards */
    .card {
      flex: 0 0 auto;
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      background: #141414;
      transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.3s, border-color 0.3s;
      border: 1px solid rgba(255,255,255,0.05);
    }
    /* 16:9 for TV/Channels */
    .card-tv { width: 260px; aspect-ratio: 16/9; }
    /* 2:3 for Movies/Series */
    .card-vod { width: 180px; aspect-ratio: 2/3; }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }
    .card:hover {
      transform: scale(1.08) translateY(-5px);
      z-index: 50;
      box-shadow: 0 15px 30px rgba(0,0,0,0.8);
      border-color: var(--accent-gold);
    }
    .card:hover img {
      transform: scale(1.05);
    }
    
    /* Info Overlay */
    .card-info {
      position: absolute;
      bottom: 0; left: 0; width: 100%;
      padding: 20px 10px 10px;
      background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.6) 60%, transparent 100%);
      opacity: 0;
      transition: opacity 0.3s;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    .card:hover .card-info {
      opacity: 1;
    }
    .card-title {
      font-size: 0.9rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .live-badge {
      position: absolute;
      top: 8px; right: 8px;
      background: rgba(229, 9, 20, 0.8);
      color: white;
      font-size: 0.6rem;
      font-weight: bold;
      padding: 2px 6px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
      backdrop-filter: blur(4px);
    }
    .live-badge .dot {
      width: 6px; height: 6px;
      background: white;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    /* Grid Layout for full pages */
    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 15px;
      padding: 100px 4% 40px;
    }
    @media (max-width: 600px) {
      .grid-container { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
      .card-vod { width: 140px; }
      .card-tv { width: 200px; }
    }

    /* Page Transitions */
    .fade-content {
      transition: opacity 0.4s ease, transform 0.4s ease;
      opacity: 1;
      transform: translateY(0);
    }
    .fade-out {
      opacity: 0;
      transform: translateY(20px);
    }

    /* Cinematic Player Overlay */
    #player-modal {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: #000;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
    #player-modal.active {
      opacity: 1;
      pointer-events: all;
    }
    .player-header {
      position: absolute;
      top: 0; left: 0; width: 100%;
      padding: 20px 4%;
      background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 50;
    }
    .player-wrapper {
      width: 100%;
      max-width: 1200px;
      aspect-ratio: 16/9;
      position: relative;
      background: #07070a;
      box-shadow: 0 0 50px rgba(207, 168, 94, 0.1);
    }
    video, iframe {
      width: 100%; height: 100%;
      border: none;
    }

    @keyframes pulse {
      0% { transform: scale(0.95); opacity: 0.5; }
      50% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(0.95); opacity: 0.5; }
    }
    
    /* Search Bar Input */
    .search-input {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 6px 12px 6px 35px;
      border-radius: 20px;
      color: white;
      font-size: 0.9rem;
      width: 0;
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .search-box {
      position: relative;
      display: flex;
      align-items: center;
    }
    .search-box i {
      position: absolute;
      left: 10px;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      z-index: 10;
    }
    .search-box:hover .search-input, .search-input:focus {
      width: 200px;
      opacity: 1;
      background: rgba(0, 0, 0, 0.5);
      border-color: var(--accent-gold);
    }
    @media (max-width: 768px) {
      .nav-links { display: none; } /* Mobile menu toggle needed */
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav id="navbar" class="fixed top-0 left-0 w-full z-50 px-4 py-4 md:px-8 flex items-center justify-between">
    <div class="flex items-center gap-8">
      <div class="logo cursor-pointer" onclick="loadPage('home', document.getElementById('nav-home'))">
        <span class="text-xl md:text-2xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-white to-[#cfa85e]">
          TV GLOBAL
        </span>
      </div>
      <div class="nav-links hidden md:flex items-center gap-6 text-sm text-gray-400 font-light">
        <a href="#" id="nav-home" class="nav-link active" onclick="loadPage('home', this)">Inicio</a>
        <a href="#" class="nav-link" onclick="loadPage('nacional', this)">Nacional</a>
        <a href="#" class="nav-link" onclick="loadPage('peliculas', this)">Películas</a>
        <a href="#" class="nav-link" onclick="loadPage('series', this)">Series</a>
      </div>
    </div>
    <div class="flex items-center gap-4">
      <div class="search-box">
        <i class="fas fa-search" onclick="document.getElementById('searchInput').focus()"></i>
        <input type="text" id="searchInput" class="search-input outline-none" placeholder="Títulos, personas, géneros">
      </div>
      <!-- Mobile Menu Toggle -->
      <button class="md:hidden text-white" onclick="toggleMobileMenu()">
        <i class="fas fa-bars text-xl"></i>
      </button>
    </div>
  </nav>

  <!-- Mobile Menu Overlay -->
  <div id="mobile-menu" class="fixed inset-0 bg-black/95 z-40 hidden flex-col items-center justify-center gap-8 text-2xl font-bold transition-opacity">
    <button class="absolute top-6 right-6 text-white text-3xl" onclick="toggleMobileMenu()">&times;</button>
    <a href="#" class="nav-link" onclick="loadPage('home', this); toggleMobileMenu()">Inicio</a>
    <a href="#" class="nav-link" onclick="loadPage('nacional', this); toggleMobileMenu()">Nacional</a>
    <a href="#" class="nav-link" onclick="loadPage('peliculas', this); toggleMobileMenu()">Películas</a>
    <a href="#" class="nav-link" onclick="loadPage('series', this); toggleMobileMenu()">Series</a>
  </div>

  <!-- Main View Container -->
  <div id="app-view" class="fade-content">
    
    <!-- Dynamic Content gets injected here by JS -->
    <div id="content-container"></div>

  </div>

  <!-- Cinematic Player Modal -->
  <div id="player-modal">
    <div class="player-header">
      <button class="text-white hover:text-[#cfa85e] transition text-lg flex items-center gap-2" onclick="closePlayer()">
        <i class="fas fa-arrow-left"></i> Regresar
      </button>
      <div class="text-sm font-bold text-gray-300" id="player-title">TV GLOBAL STREAMING</div>
    </div>
    <div class="player-wrapper">
      <video id="native-player" controls class="hidden"></video>
      <iframe id="main-player" src="" frameborder="0" allowfullscreen sandbox="allow-scripts allow-same-origin" class="hidden"></iframe>
    </div>
  </div>

  <script>
    // ----------------------------------------------------
    // STATE & INITIALIZATION
    // ----------------------------------------------------
    let currentPage = 'home';
    let hls = null;
    let mpegtsPlayer = null;

    // Listen to Scroll for Navbar
    window.addEventListener('scroll', () => {
      const nav = document.getElementById('navbar');
      if (window.scrollY > 50) {
        nav.classList.add('scrolled');
      } else {
        nav.classList.remove('scrolled');
      }
    });

    function toggleMobileMenu() {
      const menu = document.getElementById('mobile-menu');
      menu.classList.toggle('hidden');
      menu.classList.toggle('flex');
    }

    // Initialize App
    document.addEventListener("DOMContentLoaded", () => {
      loadPage('home', document.getElementById('nav-home'));
      setupSearch();
    });

    // ----------------------------------------------------
    // ROUTER & RENDERER
    // ----------------------------------------------------
    function loadPage(page, element) {
      if (element) {
        document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
        element.classList.add('active');
      }

      const view = document.getElementById('app-view');
      view.classList.add('fade-out');

      setTimeout(() => {
        const container = document.getElementById('content-container');
        window.scrollTo(0, 0);

        if (page === 'home') renderHome(container);
        else if (page === 'nacional') renderGrid(container, 'Nacional', vipDatabase, 'tv');
        else if (page === 'peliculas') renderGrid(container, 'Películas', moviesDatabase, 'vod');
        else if (page === 'series') renderGrid(container, 'Series', seriesDatabase, 'vod');
        
        view.classList.remove('fade-out');
      }, 400);
    }

    // ----------------------------------------------------
    // TEMPLATES
    // ----------------------------------------------------
    function renderHome(container) {
      let html = '';
      
      // HERO SECTION
      // Pick a random popular movie or channel for the hero
      let heroItem = null;
      let bgImg = 'https://images.unsplash.com/photo-1593784991095-a205069470b6?auto=format&fit=crop&q=80&w=2070';
      
      if (typeof moviesDatabase !== 'undefined' && moviesDatabase.length > 0) {
        heroItem = moviesDatabase[Math.floor(Math.random() * Math.min(50, moviesDatabase.length))];
        if (heroItem.logo && heroItem.logo.includes('tmdb')) {
          bgImg = heroItem.logo.replace('w600_and_h900_bestv2', 'original');
        }
      } else if (typeof premiumDatabase !== 'undefined' && premiumDatabase.length > 0) {
        heroItem = premiumDatabase[0];
      }

      html += `
        <div class="hero" id="hero-section" style="background-image: url('${bgImg}');">
          <div class="hero-vignette"></div>
          <div class="hero-content">
            <h1 class="hero-title">${heroItem ? heroItem.name : 'TV GLOBAL PREMIUM'}</h1>
            <p class="hero-desc">Disfruta de la mejor televisión en vivo, miles de películas y series en alta definición. Contenido ilimitado 24/7 sin interrupciones.</p>
            <div class="flex gap-4">
              <button class="btn-premium btn-gold" onclick="playVipChannel('${heroItem ? heroItem.url : ''}')">
                <i class="fas fa-play"></i> Reproducir
              </button>
              <button class="btn-premium">
                <i class="fas fa-info-circle"></i> Más Información
              </button>
            </div>
          </div>
        </div>
      `;

      // ROWS SECTION
      if (typeof premiumDatabase !== 'undefined') {
        // Group by category, pick top 10 categories that have the most channels
        const catMap = {};
        premiumDatabase.forEach(c => {
          let cat = (c.category || 'OTROS').toUpperCase().trim();
          if(!catMap[cat]) catMap[cat] = [];
          catMap[cat].push(c);
        });

        const sortedCats = Object.keys(catMap).sort((a, b) => catMap[b].length - catMap[a].length).slice(0, 15);

        sortedCats.forEach(catName => {
          const channels = catMap[catName].slice(0, 30); // Max 30 per row to prevent lag
          if (channels.length >= 4) {
            html += `
              <div class="row-container">
                <h2 class="row-title">${catName}</h2>
                <div class="row-inner" onwheel="horizontalScroll(event, this)">
                  ${channels.map(c => `
                    <div class="card card-tv" onclick="playVipChannel('${c.url}')" data-name="${c.name.toLowerCase()}">
                      <div class="live-badge"><div class="dot"></div>EN VIVO</div>
                      <img src="${c.logo}" onerror="this.src='https://ui-avatars.com/api/?name=TV&background=141414&color=cfa85e&size=300'" loading="lazy">
                      <div class="card-info">
                        <h3 class="card-title">${c.name}</h3>
                      </div>
                    </div>
                  `).join('')}
                </div>
              </div>
            `;
          }
        });
      }

      container.innerHTML = html;
    }

    function renderGrid(container, title, db, type) {
      if (!db || db.length === 0) {
        container.innerHTML = `<div class="pt-32 text-center text-xl text-gray-500">No hay contenido disponible.</div>`;
        return;
      }

      const isTv = type === 'tv';
      const items = db.slice(0, 500); // Limit to 500 for grid performance

      let html = `
        <div class="pt-24 px-4 md:px-8 pb-4">
          <h1 class="text-3xl font-bold mb-2">${title}</h1>
          <div class="w-16 h-1 bg-[#cfa85e] rounded"></div>
        </div>
        <div class="grid-container pt-4">
          ${items.map(c => `
            <div class="card ${isTv ? 'card-tv w-full' : 'card-vod w-full'}" onclick="playVipChannel('${c.url}')" data-name="${c.name.toLowerCase()}">
              ${isTv ? '<div class="live-badge"><div class="dot"></div>EN VIVO</div>' : ''}
              <img src="${c.logo}" onerror="this.src='https://ui-avatars.com/api/?name=${isTv?'TV':'CINE'}&background=141414&color=cfa85e&size=300'" loading="lazy">
              <div class="card-info">
                <h3 class="card-title">${c.name}</h3>
              </div>
            </div>
          `).join('')}
        </div>
      `;
      container.innerHTML = html;
    }

    // ----------------------------------------------------
    // UTILS & EVENTS
    // ----------------------------------------------------
    // Allow horizontal scroll with mouse wheel on rows
    function horizontalScroll(event, element) {
      event.preventDefault();
      element.scrollLeft += event.deltaY > 0 ? 300 : -300;
    }

    // Search functionality
    function setupSearch() {
      const input = document.getElementById('searchInput');
      input.addEventListener('keyup', (e) => {
        const val = e.target.value.toLowerCase();
        document.querySelectorAll('.card').forEach(card => {
          const name = card.dataset.name || "";
          if (name.includes(val)) {
            card.style.display = "";
          } else {
            card.style.display = "none";
          }
        });
        
        // Hide empty rows
        document.querySelectorAll('.row-container').forEach(row => {
          const hasVisible = Array.from(row.querySelectorAll('.card')).some(c => c.style.display !== 'none');
          row.style.display = hasVisible ? '' : 'none';
        });
      });
    }

    // ----------------------------------------------------
    // PLAYER LOGIC
    // ----------------------------------------------------
    function playVipChannel(url) {
      if (!url) return;
      
      const modal = document.getElementById('player-modal');
      const video = document.getElementById('native-player');
      const iframe = document.getElementById('main-player');
      
      modal.classList.add('active');
      document.body.style.overflow = 'hidden'; // prevent background scroll

      // Reset
      video.classList.add('hidden');
      iframe.classList.add('hidden');
      video.pause();
      iframe.src = '';
      if(hls) { hls.destroy(); hls = null; }
      if(mpegtsPlayer) { mpegtsPlayer.destroy(); mpegtsPlayer = null; }

      let proxyUrl = url;
      if (url.startsWith('http://') || url.startsWith('https://')) {
          proxyUrl = '/api/proxy?url=' + encodeURIComponent(url);
      }

      let isRawTs = url.includes('.ts') || url.includes('attbr.fun') || url.includes('cloudmail.site');

      if (isRawTs && typeof mpegts !== 'undefined' && mpegts.getFeatureList().mseLivePlayback) {
          video.classList.remove('hidden');
          mpegtsPlayer = mpegts.createPlayer({
              type: 'm2ts',
              isLive: true,
              url: proxyUrl
          });
          mpegtsPlayer.attachMediaElement(video);
          mpegtsPlayer.load();
          mpegtsPlayer.play();
      } 
      else if (typeof Hls !== 'undefined' && Hls.isSupported() && url.includes(".m3u8")) {
          video.classList.remove('hidden');
          hls = new Hls();
          hls.loadSource(proxyUrl);
          hls.attachMedia(video);
          hls.on(Hls.Events.MANIFEST_PARSED, function() {
              video.play();
          });
      }
      else if (video.canPlayType('application/vnd.apple.mpegurl')) {
          video.classList.remove('hidden');
          video.src = proxyUrl;
          video.addEventListener('loadedmetadata', function() {
              video.play();
          });
      } else {
          // Fallback to iframe for external players
          iframe.classList.remove('hidden');
          iframe.src = url;
      }
    }

    function closePlayer() {
      const modal = document.getElementById('player-modal');
      const video = document.getElementById('native-player');
      const iframe = document.getElementById('main-player');
      
      modal.classList.remove('active');
      document.body.style.overflow = 'auto'; // restore scroll
      
      video.pause();
      video.src = '';
      iframe.src = '';
      if(hls) { hls.destroy(); hls = null; }
      if(mpegtsPlayer) { mpegtsPlayer.destroy(); mpegtsPlayer = null; }
    }
  </script>
</body>
</html>
