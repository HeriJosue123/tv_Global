<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tv_Global - Copa del Mundo</title>
    <meta name="description" content="Plataforma premium para disfrutar de los partidos de la Copa del Mundo.">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">🏆 tv_Global</div>
        <ul class="nav-links">
            <li><a href="#">En Vivo</a></li>
            <li><a href="#">Partidos</a></li>
        </ul>
    </nav>
    <main class="container">
        <section class="video-section">
            <div class="glass-panel">
                <div class="video-wrapper">
                    <!-- Placeholder de video para probar las URLs -->
                    <iframe id="main-player" src="https://embedindia.st/embed/wc/2026-06-26/uru-esp/telemundo" allowfullscreen allow="encrypted-media; autoplay"></iframe>
                </div>
                <div class="match-info">
                    <h1 id="match-title">Partido Destacado</h1>
                    <p id="match-description">Selecciona un partido para verlo en el reproductor.</p>
                </div>
            </div>
        </section>
        
        <section class="matches-list">
            <h2>Próximos Partidos</h2>
            <div class="grid">
                <!-- Opciones de transmisión -->
                <div class="match-card" onclick="playMatch('Telemundo (Español)', 'https://embedindia.st/embed/wc/2026-06-26/uru-esp/telemundo')">
                    <div class="match-teams">Telemundo</div>
                    <div class="match-status live">ES</div>
                </div>
                <div class="match-card" onclick="playMatch('DSports (Español)', 'https://embedindia.st/embed/wc/2026-06-26/uru-esp/dsports')">
                    <div class="match-teams">DSports</div>
                    <div class="match-status live">ES</div>
                </div>
                <div class="match-card" onclick="playMatch('DAZN Spain (Español)', 'https://embedindia.st/embed/wc/2026-06-26/uru-esp/dazn')">
                    <div class="match-teams">DAZN Spain</div>
                    <div class="match-status live">ES</div>
                </div>
                <div class="match-card" onclick="playMatch('Peacock 4K (Inglés)', 'https://embedindia.st/embed/wc/2026-06-26/uru-esp/peacock-4k')">
                    <div class="match-teams">Peacock 4K</div>
                    <div class="match-status">EN | HEVC</div>
                </div>
                <div class="match-card" onclick="playMatch('FOX (Inglés)', 'https://embedindia.st/embed/wc/2026-06-26/uru-esp/fox')">
                    <div class="match-teams">FOX</div>
                    <div class="match-status">EN</div>
                </div>
                <div class="match-card" onclick="playMatch('Fussball UHD', 'https://embedindia.st/embed/wc/2026-06-26/uru-esp/fussball-uhd')">
                    <div class="match-teams">Fussball.TV</div>
                    <div class="match-status">UHD | DE</div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
